<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Benchmark Dashboard - Live Results</title>
    <!-- Use vanilla CSS for styling -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --secondary: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.15);
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--accent);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .stat-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            padding: 0.5rem 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        
        .stat-val {
            font-weight: 600;
            color: var(--secondary);
            font-family: monospace;
            font-size: 1.1rem;
        }

        .alert-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        
        #status {
            color: #f59e0b;
        }
    </style>
</head>
<body>

    <h1>Global LLM Mega-Benchmark</h1>
    <p class="subtitle">Processing Structural Prompts across Local Models • Optimized for Ephemeral 4GB VRAM Hardware.</p>

    <div class="alert-box">
        Phase 1 Metrics and Phase 2 Variance (Temp 0.0 vs 0.7) are executing with 84% time efficiency. 
        <span id="status">Loading dashboard_data.json asynchronously...</span>
    </div>

    <div class="dashboard-grid" id="grid">
        <!-- Rendered via JS -->
    </div>

    <script>
        async function renderDashboard() {
            try {
                const response = await fetch('../reports/dashboard_data.json');
                if (!response.ok) throw new Error("JSON not found. Run Offline Aggregator first!");
                
                const data = await response.json();
                document.getElementById('status').innerText = "Data loaded natively via JSON!";
                document.getElementById('status').style.color = "#38bdf8";
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                // For each model in the summary, create a glassmorphic card dynamically!
                data.summary.forEach(modelData => {
                    const tps = parseFloat(modelData.tps).toFixed(2);
                    const ttft = parseFloat(modelData.ttft).toFixed(2);
                    const latency = parseFloat(modelData.latency).toFixed(2);
                    const vram = parseFloat(modelData.peak_vram_mb).toFixed(1);
                    
                    const cardHTML = `
                        <div class="card">
                            <h2>${modelData.model}</h2>
                            <div class="stat-group">
                                <span class="stat-label">Average TPS:</span>
                                <span class="stat-val">${tps} t/s</span>
                            </div>
                            <div class="stat-group">
                                <span class="stat-label">TTFT (First Token):</span>
                                <span class="stat-val">${ttft}s</span>
                            </div>
                            <div class="stat-group">
                                <span class="stat-label">Total Latency:</span>
                                <span class="stat-val">${latency}s</span>
                            </div>
                            <div class="stat-group">
                                <span class="stat-label">Peak VRAM:</span>
                                <span class="stat-val">${vram} MB</span>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });
            } catch (err) {
                document.getElementById('status').innerText = "Awaiting reports/dashboard_data.json generation... (Run Benchmark Phase 3)";
                document.getElementById('status').style.color = "#ef4444";
                
                // Fallback rendering
                document.getElementById('grid').innerHTML = `
                    <div class="card"><h2>Awaiting Data...</h2><p class="stat-label">Please execute the Python pipeline to generate the metrics!</p></div>
                `;
            }
        }
        
        // Init
        renderDashboard();
    </script>
</body>
</html>
